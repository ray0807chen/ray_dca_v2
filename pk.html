  <style>
    /* PK-only minor tweaks */
    .pk-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 1rem 3rem;
        }

        .pk-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #e8c56e, #f0e6c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            animation: fadeIn 0.7s ease-out;
        }

        .pk-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
        }

        /* ── 設定面板 ── */
        .pk-config {
            background: #1e2240;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .config-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: flex-end;
            margin-bottom: 1.2rem;
        }

        .config-row:last-child {
            margin-bottom: 0;
        }

        .config-group {
            flex: 1;
            min-width: 180px;
        }

        .config-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.4rem;
            letter-spacing: 0.04em;
        }

        /* 股票搜尋欄 */
        .stock-select-wrap {
            position: relative;
        }

        .stock-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 10px;
            color: var(--text-color);
            padding: 0.8rem 1rem;
            font-size: 1.05rem;
            font-family: inherit;
            transition: border-color 0.25s;
        }

        .stock-input:focus {
            outline: none;
            border-color: rgba(201, 168, 76, 0.6);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }

        .stock-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #1a1f3c;
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 10px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .stock-dropdown.open {
            display: block;
        }

        .dropdown-item-pk {
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            transition: background 0.2s;
        }

        .dropdown-item-pk:hover,
        .dropdown-item-pk.highlighted {
            background: rgba(201, 168, 76, 0.12);
            color: #e8c56e;
        }

        .dropdown-item-pk .sym {
            font-weight: 700;
            color: var(--text-color);
            margin-right: 0.5rem;
        }

        /* ── 模式切換 ── */
        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .mode-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
        }

        .mode-btn.active {
            background: rgba(201, 168, 76, 0.2);
            color: #e8c56e;
            font-weight: 600;
        }

        /* ── 年份快選 ── */
        .year-btns {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .year-btn {
            padding: 0.6rem 1rem;
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.22s;
        }

        .year-btn:hover {
            border-color: rgba(201, 168, 76, 0.5);
            color: #e8c56e;
        }

        .year-btn.active {
            background: rgba(201, 168, 76, 0.18);
            border-color: rgba(201, 168, 76, 0.65);
            color: #e8c56e;
            font-weight: 700;
        }

        /* ── DCA 額外參數 ── */
        .dca-extra {
            display: none;
        }

        .dca-extra.show {
            display: flex;
        }

        .dca-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            color: var(--text-color);
            padding: 0.8rem 1rem;
            font-size: 1.05rem;
            font-family: inherit;
            transition: border-color 0.25s;
        }

        .dca-input:focus {
            outline: none;
            border-color: rgba(201, 168, 76, 0.55);
        }

        /* ── 比較按鈕 ── */
        .pk-go-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #c9a84c, #e8c56e);
            border: none;
            border-radius: 12px;
            color: #0f1227;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.06em;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .pk-go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
        }

        .pk-go-btn:active {
            transform: translateY(0);
        }

        /* ── 警告提示 ── */
        .pk-warning {
            display: none;
            background: rgba(255, 180, 60, 0.1);
            border: 1px solid rgba(255, 180, 60, 0.4);
            border-radius: 12px;
            padding: 1rem 1.4rem;
            color: #ffc87a;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .pk-warning.show {
            display: block;
        }

        /* ── 結果區 ── */
        .pk-result {
            display: none;
        }

        .pk-result.show {
            display: block;
        }

        /* PK 對決標頭 */
        .pk-vs-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 0.8rem;
        }

        .pk-stock-label {
            flex: 1;
            text-align: center;
            background: #1e2240;
            border-radius: 14px;
            padding: 1rem;
            border: 2px solid;
        }

        .pk-stock-label.left {
            border-color: #4e9af1;
        }

        .pk-stock-label.right {
            border-color: #f1774e;
        }

        .pk-stock-label .sym-big {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .pk-stock-label .name-small {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .vs-circle {
            background: linear-gradient(135deg, #c9a84c, #e8c56e);
            color: #0f1227;
            font-weight: 900;
            font-size: 0.9rem;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 圖表 */
        .chart-card {
            background: #1e2240;
            border: 1px solid rgba(201, 168, 76, 0.18);
            border-radius: 18px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .chart-card canvas {
            max-height: 340px;
        }

        /* 指標對比表 */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0.6rem 0;
            font-size: 0.9rem;
        }

        .metric-row {
            display: contents;
        }

        .metric-row>* {
            padding: 0.55rem 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            margin: 2px;
            border-radius: 8px;
        }

        .metric-row .m-label {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .metric-row .m-val {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .metric-row .m-left {
            text-align: right;
            color: #4e9af1;
        }

        .metric-row .m-right {
            text-align: left;
            color: #f1774e;
        }

        .m-val.winner {
            text-shadow: 0 0 12px currentColor;
        }

        /* 勝者徽章 */
        .winner-badge {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
        }

        .winner-badge.show {
            display: block;
        }

        .winner-badge .badge-box {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge-box.left-win {
            background: rgba(78, 154, 241, 0.15);
            border: 2px solid #4e9af1;
            color: #4e9af1;
        }

        .badge-box.right-win {
            background: rgba(241, 119, 78, 0.15);
            border: 2px solid #f1774e;
            color: #f1774e;
        }

        .badge-box.tie {
            background: rgba(201, 168, 76, 0.15);
            border: 2px solid #e8c56e;
            color: #e8c56e;
        }

        @media (max-width: 600px) {
            .pk-config {
                padding: 1.2rem;
            }

            .config-group {
                min-width: 140px;
            }

            .metrics-grid {
                font-size: 0.8rem;
            }
        }
    </style>

  <div id="toast-container" aria-live="polite"></div>
  <script>
        // ── 狀態 ──
        let companies = {};
        let mode = 'allin';
        let years = 1;
        let selectedA = null;
        let selectedB = null;
        let pkChartInstance = null;

        // ── 載入公司列表 ──
        fetch('companies.json')
            .then(r => r.json())
            .then(data => { companies = data; })
            .catch(() => console.warn('companies.json 載入失敗'));

        // ── 模式 / 年份切換 ──
        function setMode(m) {
            mode = m;
            document.getElementById('btnAllin').classList.toggle('active', m === 'allin');
            document.getElementById('btnDca').classList.toggle('active', m === 'dca');
            document.getElementById('dcaExtra').classList.toggle('show', m === 'dca');
            document.getElementById('allinExtra').style.display = m === 'allin' ? '' : 'none';
        }

        function setYear(btn) {
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            years = parseInt(btn.dataset.y);
        }

        // ── 搜尋下拉 ──
        function setupSearch(inputId, dropdownId, onSelect) {
            const input = document.getElementById(inputId);
            const dd = document.getElementById(dropdownId);

            input.addEventListener('input', () => {
                const q = input.value.trim().toLowerCase();
                if (!q || Object.keys(companies).length === 0) { dd.classList.remove('open'); return; }
                const matches = Object.entries(companies).filter(([sym, co]) =>
                    sym.toLowerCase().includes(q) ||
                    (co.name || '').toLowerCase().includes(q) ||
                    (co.chinese_name || '').toLowerCase().includes(q)
                ).slice(0, 30);
                if (!matches.length) { dd.classList.remove('open'); return; }
                dd.innerHTML = matches.map(([sym, co]) =>
                    `<div class="dropdown-item-pk" data-sym="${sym}">
                        <span class="sym">${sym}</span>${co.chinese_name || co.name}
                    </div>`
                ).join('');
                dd.classList.add('open');
            });

            dd.addEventListener('click', e => {
                const item = e.target.closest('.dropdown-item-pk');
                if (!item) return;
                const sym = item.dataset.sym;
                input.value = sym;
                dd.classList.remove('open');
                onSelect(sym);
            });

            document.addEventListener('click', e => {
                if (!input.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
            });
        }

        setupSearch('inputA', 'dropdownA', sym => { selectedA = sym; });
        setupSearch('inputB', 'dropdownB', sym => { selectedB = sym; });

        // ── 從 JSON 讀取股價 ──
        async function loadPrices(sym) {
            const r = await fetch(`stock_data/${sym}.json`);
            if (!r.ok) throw new Error(`找不到 ${sym} 的數據`);
            const data = await r.json();
            return data.prices; // { "YYYY-MM-DD": price }
        }

        // ── 取最近 N 年的每月資料 ──
        function sliceYears(prices, n) {
            const dates = Object.keys(prices).sort();
            if (!dates.length) return null;
            const lastDate = new Date(dates[dates.length - 1]);
            const startDate = new Date(lastDate);
            startDate.setFullYear(startDate.getFullYear() - n);
            const filtered = dates.filter(d => new Date(d) >= startDate);
            if (!filtered.length) return null;
            // 每月取最後一個交易日
            const monthly = {};
            filtered.forEach(d => {
                const ym = d.slice(0, 7);
                monthly[ym] = prices[d];
            });
            return { monthly, startDate, endDate: lastDate, allDates: filtered, prices };
        }

        // ── All-in 計算 ──
        function calcAllin(pricesObj, startDate, invest) {
            const dates = Object.keys(pricesObj.prices).sort()
                .filter(d => new Date(d) >= pricesObj.startDate);
            if (!dates.length) return null;
            const buyPrice = pricesObj.prices[dates[0]];
            const shares = invest / buyPrice;
            const labels = [];
            const values = [];
            Object.entries(pricesObj.monthly).sort().forEach(([ym, price]) => {
                labels.push(ym);
                values.push(+(shares * price).toFixed(2));
            });
            const finalVal = values[values.length - 1];
            const totalCost = invest;
            const totalReturn = +((finalVal - totalCost) / totalCost * 100).toFixed(2);
            const nYears = (new Date(pricesObj.endDate) - new Date(dates[0])) / (365.25 * 86400000);
            const cagr = nYears > 0 ? +((Math.pow(finalVal / totalCost, 1 / nYears) - 1) * 100).toFixed(2) : 0;
            return { labels, values, totalCost, finalVal, totalReturn, cagr };
        }

        // ── DCA 計算 ──
        function calcDca(pricesObj, monthly, day) {
            const monthlyPrice = Object.entries(pricesObj.monthly).sort();
            let shares = 0, totalCost = 0;
            const labels = [], values = [];
            monthlyPrice.forEach(([ym, price]) => {
                // 模擬當月買入
                const units = monthly / price;
                shares += units;
                totalCost += monthly;
                labels.push(ym);
                values.push(+(shares * price).toFixed(2));
            });
            const finalVal = values[values.length - 1] || 0;
            const totalReturn = totalCost > 0 ? +((finalVal - totalCost) / totalCost * 100).toFixed(2) : 0;
            const nMonths = labels.length;
            const nYears = nMonths / 12;
            const cagr = nYears > 0 && totalCost > 0
                ? +((Math.pow(finalVal / totalCost, 1 / nYears) - 1) * 100).toFixed(2) : 0;
            return { labels, values, totalCost, finalVal, totalReturn, cagr };
        }

        // ── 核心：執行比較 ──
        async function runPK() {
            // 驗證輸入
            if (!selectedA) selectedA = document.getElementById('inputA').value.trim().toUpperCase();
            if (!selectedB) selectedB = document.getElementById('inputB').value.trim().toUpperCase();

            const warn = document.getElementById('pkWarning');
            const result = document.getElementById('pkResult');
            warn.classList.remove('show');
            result.classList.remove('show');

            if (!selectedA || !selectedB) {
                warn.textContent = '請先選擇兩支股票。';
                warn.classList.add('show'); return;
            }
            if (selectedA === selectedB) {
                warn.textContent = '請選擇兩支不同的股票。';
                warn.classList.add('show'); return;
            }

            let pricesA, pricesB;
            try {
                [pricesA, pricesB] = await Promise.all([loadPrices(selectedA), loadPrices(selectedB)]);
            } catch (e) {
                warn.textContent = e.message;
                warn.classList.add('show'); return;
            }

            // 切 N 年資料
            const sliceA = sliceYears(pricesA, years);
            const sliceB = sliceYears(pricesB, years);

            const warnings = [];
            const dateA = Object.keys(pricesA).sort()[0];
            const dateB = Object.keys(pricesB).sort()[0];
            const needStart = new Date();
            needStart.setFullYear(needStart.getFullYear() - years);

            if (!sliceA || new Date(dateA) > needStart) {
                warnings.push(`${selectedA} 的歷史數據不足 ${years} 年（最早：${dateA}），將以可用數據範圍計算。`);
            }
            if (!sliceB || new Date(dateB) > needStart) {
                warnings.push(`${selectedB} 的歷史數據不足 ${years} 年（最早：${dateB}），將以可用數據範圍計算。`);
            }

            if (warnings.length) {
                warn.innerHTML = warnings.join('<br>');
                warn.classList.add('show');
            }

            // 取最短共同起點（讓兩條線從同一天開始，公平比較）
            const startA = sliceA ? Object.keys(sliceA.monthly).sort()[0] : null;
            const startB = sliceB ? Object.keys(sliceB.monthly).sort()[0] : null;
            const commonStart = startA && startB ? (startA > startB ? startA : startB) : (startA || startB);

            function filterFromStart(slice) {
                if (!slice) return null;
                const filtered = {};
                Object.entries(slice.monthly).sort().forEach(([ym, v]) => {
                    if (ym >= commonStart) filtered[ym] = v;
                });
                return { ...slice, monthly: filtered };
            }

            const fa = filterFromStart(sliceA);
            const fb = filterFromStart(sliceB);

            // 計算
            const invest = mode === 'allin'
                ? parseFloat(document.getElementById('allinAmount').value) || 10000
                : parseFloat(document.getElementById('dcaAmount').value) || 500;
            const dcaDay = parseInt(document.getElementById('dcaDay').value) || 1;

            let resA, resB;
            if (mode === 'allin') {
                resA = calcAllin(fa, commonStart, invest);
                resB = calcAllin(fb, commonStart, invest);
            } else {
                resA = calcDca(fa, invest, dcaDay);
                resB = calcDca(fb, invest, dcaDay);
            }
            if (!resA || !resB) {
                warn.textContent = '計算失敗，請確認兩支股票均有足夠數據。';
                warn.classList.add('show'); return;
            }

            // 統一 labels（取聯集）
            const allLabels = [...new Set([...resA.labels, ...resB.labels])].sort();
            function alignValues(res, labels) {
                const map = {};
                res.labels.forEach((l, i) => map[l] = res.values[i]);
                return labels.map(l => map[l] ?? null);
            }
            const valA = alignValues(resA, allLabels);
            const valB = alignValues(resB, allLabels);

            // ── 繪圖 ──
            if (pkChartInstance) pkChartInstance.destroy();
            const ctx = document.getElementById('pkChart').getContext('2d');
            pkChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allLabels,
                    datasets: [
                        {
                            label: selectedA,
                            data: valA,
                            borderColor: '#4e9af1',
                            backgroundColor: 'rgba(78,154,241,0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.3,
                            spanGaps: true
                        },
                        {
                            label: selectedB,
                            data: valB,
                            borderColor: '#f1774e',
                            backgroundColor: 'rgba(241,119,78,0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.3,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    animation: { duration: 900, easing: 'easeInOutQuart' },
                    plugins: {
                        legend: { labels: { color: '#eef0f6', font: { size: 12 }, padding: 14, boxWidth: 12 } },
                        tooltip: {
                            backgroundColor: 'rgba(13,17,32,.95)',
                            borderColor: 'rgba(201,168,76,.3)',
                            borderWidth: 1,
                            titleColor: '#eef0f6',
                            bodyColor: '#8893a8',
                            padding: 12,
                            callbacks: {
                                label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',') ?? '—'}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#8a8fa8', maxTicksLimit: 8, font: { size: 11 } },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: {
                                color: '#8a8fa8',
                                font: { size: 11 },
                                callback: v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });

            // ── 指標表 ──
            const coA = companies[selectedA] || {};
            const coB = companies[selectedB] || {};
            document.getElementById('labelA').textContent = selectedA;
            document.getElementById('labelAName').textContent = coA.chinese_name || coA.name || '';
            document.getElementById('labelB').textContent = selectedB;
            document.getElementById('labelBName').textContent = coB.chinese_name || coB.name || '';

            function fmt(v) { return v >= 0 ? `+${v}%` : `${v}%`; }
            function fmtD(v) { return '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

            const metrics = [
                {
                    label: '最終市值', vA: fmtD(resA.finalVal), vB: fmtD(resB.finalVal),
                    win: resA.finalVal > resB.finalVal ? 'A' : resA.finalVal < resB.finalVal ? 'B' : 'T'
                },
                {
                    label: '總報酬率', vA: fmt(resA.totalReturn), vB: fmt(resB.totalReturn),
                    win: resA.totalReturn > resB.totalReturn ? 'A' : resA.totalReturn < resB.totalReturn ? 'B' : 'T'
                },
                {
                    label: '年化報酬 (CAGR)', vA: fmt(resA.cagr), vB: fmt(resB.cagr),
                    win: resA.cagr > resB.cagr ? 'A' : resA.cagr < resB.cagr ? 'B' : 'T'
                },
                { label: '總投入成本', vA: fmtD(resA.totalCost), vB: fmtD(resB.totalCost), win: 'T' },
            ];

            const grid = document.getElementById('metricsGrid');
            grid.innerHTML = metrics.map(m => `
                <div class="metric-row">
                    <div class="m-val m-left ${m.win === 'A' ? 'winner' : ''}">${m.vA}</div>
                    <div class="m-label">${m.label}</div>
                    <div class="m-val m-right ${m.win === 'B' ? 'winner' : ''}">${m.vB}</div>
                </div>
            `).join('');

            // 勝者
            const wins = { A: 0, B: 0 };
            metrics.forEach(m => { if (m.win === 'A') wins.A++; else if (m.win === 'B') wins.B++; });
            const wb = document.getElementById('winnerBox');
            const badge = document.getElementById('winnerBadge');
            if (wins.A > wins.B) {
                wb.className = 'badge-box left-win';
                wb.textContent = `${selectedA} 勝出！`;
            } else if (wins.B > wins.A) {
                wb.className = 'badge-box right-win';
                wb.textContent = `${selectedB} 勝出！`;
            } else {
                wb.className = 'badge-box tie';
                wb.textContent = '勢均力敵！';
            }
            badge.classList.add('show');

            result.classList.add('show');

            // 滾到結果
            result.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ── Navbar scroll ──
        window.addEventListener('scroll', () => {
            document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 10);
        }, { passive: true });



        // ── Ripple ──
        document.addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const r = document.createElement('span');
            r.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
            btn.style.position='relative'; btn.style.overflow='hidden';
            btn.appendChild(r);
            r.addEventListener('animationend', () => r.remove(), { once: true });
        });

        // ── Simple Mobile Nav Handler ──
        (function initMobileNav() {
            const trigger   = document.getElementById('hamburgerTrigger');
            const simpleNav = document.getElementById('simpleMobileNav');
            const overlay   = document.getElementById('smnOverlay');
            const closeBtn  = document.getElementById('smnClose');

            if (trigger && simpleNav) {
                const toggleMenu = (e) => {
                    if(e) e.preventDefault();
                    const isOpen = simpleNav.classList.contains('open');
                    if (isOpen) {
                        simpleNav.classList.remove('open');
                        if(overlay) overlay.classList.remove('show');
                    } else {
                        simpleNav.classList.add('open');
                        if(overlay) overlay.classList.add('show');
                    }
                };
                trigger.addEventListener('click', toggleMenu);
                if(overlay) overlay.addEventListener('click', toggleMenu);
                if(closeBtn) closeBtn.addEventListener('click', toggleMenu);
            }
        })();
    </script>
</body>
